version: '3.8'

services:
  # Redis - Lightweight caching for results
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - candidateai-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Agent Worker - Single container for all agents (resource efficient)
  agents:
    build:
      context: .
      dockerfile: agents/Dockerfile.simple
    volumes:
      - ./data:/data
      - ./models:/models
      - ./config:/config
    environment:
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - MEMORY_LIMIT=2G
    networks:
      - candidateai-network
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

volumes:
  redis-data:

networks:
  candidateai-network:
    driver: bridge
